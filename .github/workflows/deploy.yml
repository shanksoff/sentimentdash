# ============================================================
#  .github/workflows/deploy.yml
#  CI/CD: lint → SSH deploy to server (Hetzner or any VPS)
#
#  Required GitHub Actions secrets:
#    POSTGRES_USER        DB username
#    POSTGRES_PASSWORD    DB password
#    POSTGRES_DB          DB name
#    GEMINI_API_KEY       Gemini AI API key
#    SERVER_HOST          Public IP of the server
#    SERVER_USER          SSH user (e.g. root or ubuntu)
#    SERVER_SSH_KEY       Private SSH key (PEM, no passphrase)
#    SERVER_DEPLOY_DIR    Absolute path to project dir on server
#                         e.g. /root/sentimentdash
# ============================================================

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Lint Python ─────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            database.py main.py fetch_market_data.py fetch_news.py sentiment_engine.py scheduler.py

  # ── Lint JavaScript ─────────────────────────────────────────
  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ── Deploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [lint-python, lint-js]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/server_key
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/server_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Write .env on server
        run: |
          ssh -i ~/.ssh/server_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s <<'REMOTE'
            set -e
            cd ${{ secrets.SERVER_DEPLOY_DIR }}
            cat > .env <<ENV
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ENV
            chmod 600 .env
          REMOTE

      - name: Pull latest code & rebuild containers
        run: |
          ssh -i ~/.ssh/server_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s <<'REMOTE'
            set -e
            cd ${{ secrets.SERVER_DEPLOY_DIR }}
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker compose ps
          REMOTE

      - name: Smoke-test API health
        run: |
          sleep 10
          ssh -i ~/.ssh/server_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "curl -sf http://localhost/api/price/AAPL | head -c 80 || true"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/server_key
