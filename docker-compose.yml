# ============================================================
#  docker-compose.yml
#  Production compose file.
#  nginx is handled by the portfolio repo.
#  Containers join the shared 'web' network so portfolio
#  nginx can proxy to them.
# ============================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: sentiment_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── FastAPI backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentiment_backend
    restart: always
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  # ── Daily sentiment scheduler ──────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: sentiment_scheduler
    restart: always
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── React frontend (internal only) ────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sentiment_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - internal
      - web

# ── Networks ───────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
  web:
    external: true

# ── Named volumes ──────────────────────────────────────────────
volumes:
  postgres_data:
