# ============================================================
#  nginx.conf — Production reverse proxy
#  shanksoff.com        → portfolio (temporary redirect for now)
#  sentimentdash.shanksoff.com → SentimentDash app
# ============================================================

# ── HTTP → HTTPS redirects ───────────────────────────────────
server {
    listen 80;
    server_name shanksoff.com www.shanksoff.com;
    return 301 https://shanksoff.com$request_uri;
}

server {
    listen 80;
    server_name sentimentdash.shanksoff.com;
    return 301 https://sentimentdash.shanksoff.com$request_uri;
}

# ── shanksoff.com → Portfolio ─────────────────────────────────
server {
    listen 443 ssl;
    server_name shanksoff.com www.shanksoff.com;

    ssl_certificate     /etc/letsencrypt/live/shanksoff.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shanksoff.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}

# ── sentimentdash.shanksoff.com → SentimentDash app ──────────
server {
    listen 443 ssl;
    server_name sentimentdash.shanksoff.com;

    ssl_certificate     /etc/letsencrypt/live/sentimentdash.shanksoff.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentimentdash.shanksoff.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Static React build ───────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── FastAPI reverse proxy ────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Compression ──────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml;
    gzip_min_length 1024;
}
